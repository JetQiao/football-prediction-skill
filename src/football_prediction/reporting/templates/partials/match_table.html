<section id="matchList" class="workspace" aria-labelledby="matchListTitle">
  <div class="section-heading">
    <div><span class="eyebrow">赛单</span><h2 id="matchListTitle">概率与价格工作台</h2></div>
    <span id="visibleCount" class="result-count">{{ cards|length }} 场</span>
  </div>

  <div class="filter-bar" aria-label="赛单筛选">
    <label>
      <span>联赛</span>
      <select id="leagueFilter">
        <option value="">全部联赛</option>
        {% for league in leagues %}<option value="{{ league }}">{{ league }}</option>{% endfor %}
      </select>
    </label>
    <label class="search-field">
      <span>球队</span>
      <input id="teamSearch" type="search" placeholder="搜索主队或客队" autocomplete="off">
    </label>
    <label>
      <span>排序</span>
      <select id="sortFilter">
        <option value="kickoff">按开赛时间</option>
        <option value="direction">按方向强度</option>
        <option value="edge">按概率优势</option>
        <option value="confidence">按置信度</option>
      </select>
    </label>
    <div class="segmented" role="group" aria-label="方向与价值状态">
      <button class="filter-button active" type="button" data-filter="all" aria-pressed="true">全部</button>
      <button class="filter-button" type="button" data-filter="direction:strong" aria-pressed="false">明确方向</button>
      <button class="filter-button" type="button" data-filter="direction:moderate" aria-pressed="false">中等方向</button>
      <button class="filter-button" type="button" data-filter="direction:slight" aria-pressed="false">轻微方向</button>
      <button class="filter-button" type="button" data-filter="value:candidate" aria-pressed="false">价值候选</button>
      <button class="filter-button" type="button" data-filter="direction:unavailable" aria-pressed="false">数据不可用</button>
    </div>
  </div>

  <div class="match-table" role="table" aria-label="竞彩足球赛单">
    <div class="match-table-head" role="row">
      <span role="columnheader">时间 / 联赛</span>
      <span role="columnheader">对阵</span>
      <span role="columnheader">校准概率</span>
      <span role="columnheader">公平赔率</span>
      <span role="columnheader">竞彩 SP</span>
      <span role="columnheader">方向判断</span>
      <span role="columnheader">价值判断</span>
    </div>
    <div id="matchRows" class="match-rows">
      {% for c in cards %}
      <button
        class="match-row"
        type="button"
        role="row"
        data-dialog="{{ c.dialog_id }}"
        data-league="{{ c.league }}"
        data-direction="{{ c.direction_state }}"
        data-value="{{ c.value_state }}"
        data-direction-rank="{{ c.direction_rank }}"
        data-edge="{{ c.edge if c.edge is not none else -9 }}"
        data-confidence="{{ c.confidence_rank }}"
        data-kickoff="{{ c.kickoff_full }}"
        data-search="{{ (c.home ~ ' ' ~ c.away)|lower }}"
        aria-haspopup="dialog"
        aria-controls="{{ c.dialog_id }}"
      >
        <span class="time-cell" role="cell" data-label="时间 / 联赛"><strong>{{ c.kickoff }}</strong><small>{{ c.match_no }} · {{ c.league }}</small></span>
        <span class="fixture-cell" role="cell" data-label="对阵">
          <span class="team-line"><span class="crest sm {% if c.home_flag %}has-flag flag-{{ c.home_flag }}{% endif %}" data-team="{{ c.home }}"></span><strong>{{ c.home }}</strong></span>
          <span class="team-line"><span class="crest sm {% if c.away_flag %}has-flag flag-{{ c.away_flag }}{% endif %}" data-team="{{ c.away }}"></span><strong>{{ c.away }}</strong></span>
        </span>
        <span class="triple-cell probability-cell" role="cell" data-label="校准概率"><b>{{ c.final.home|pct0 }}</b><b>{{ c.final.draw|pct0 }}</b><b>{{ c.final.away|pct0 }}</b><small>主 / 平 / 客</small></span>
        <span class="triple-cell" role="cell" data-label="公平赔率"><b>{{ c.fair_odds.home|num }}</b><b>{{ c.fair_odds.draw|num }}</b><b>{{ c.fair_odds.away|num }}</b><small>主 / 平 / 客</small></span>
        <span class="triple-cell" role="cell" data-label="竞彩 SP">
          {% if c.target_odds %}<b>{{ c.target_odds.home|num }}</b><b>{{ c.target_odds.draw|num }}</b><b>{{ c.target_odds.away|num }}</b>{% else %}<b class="span-three">待开售</b>{% endif %}
          <small>主 / 平 / 客</small>
        </span>
        <span class="direction-cell" role="cell" data-label="方向判断">
          <span class="status-badge direction-{{ c.direction_state }}">{{ c.direction_label }}</span>
          <small>{{ c.confidence_label }}置信 · {{ c.data_quality_label }}</small>
        </span>
        <span class="value-cell {% if c.edge and c.edge > 0 %}positive{% endif %}" role="cell" data-label="价值判断">
          <span class="status-badge value-{{ c.value_state }}">{{ c.value_label }}</span>
          <small>
            {% if c.value %}{{ c.value.pick_label }} {{ c.edge|signed_pct }}
            {% elif c.value_state == "unverified" %}方向有效 · 价值待验
            {% else %}{{ c.value_reason }}{% endif %}
          </small>
        </span>
      </button>
      {% endfor %}
    </div>
    {% if not cards %}<div class="empty-state">当前没有可展示赛程。</div>{% endif %}
  </div>
</section>
